<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>3-Spieler Schiffe Versenken</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="login-screen">
        <h1>Login</h1>
        <select id="player-select">
            <option>Spieler 1</option>
            <option>Spieler 2</option>
            <option>Spieler 3</option>
        </select>
        <input type="password" id="pw-input" placeholder="Passwort">
        <button onclick="login()">Starten</button>
    </div>

    <div id="game-screen" style="display:none;">
        <h2 id="welcome-msg"></h2>
        <div class="boards-container">
            <div class="board-wrapper">
                <h3>Meine Schiffe</h3>
                <div id="my-board" class="grid"></div>
            </div>
            <div class="board-wrapper">
                <h3>Gegner A</h3>
                <div id="opponent-a" class="grid"></div>
            </div>
            <div class="board-wrapper">
                <h3>Gegner B</h3>
                <div id="opponent-b" class="grid"></div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
