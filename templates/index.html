<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Spieler Schiffe Versenken</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="login-container">
        <h1>Schiffe Versenken 3P</h1>
        <select id="player-select">
            <option>Spieler 1</option>
            <option>Spieler 2</option>
            <option>Spieler 3</option>
        </select>
        <input type="password" id="password-input" placeholder="Passwort">
        <button onclick="attemptLogin()">Spiel starten</button>
    </div>

    <div id="game-container" class="hidden">
        <header>
            <h2 id="current-player-display"></h2>
            <div id="ship-counter">Noch zu platzierende Felder: 30</div>
        </header>
    
        <div class="main-layout">
            <div class="board-section">
                <h3>Meine Flotte</h3>
                <div id="my-grid" class="grid"></div>
                <button class="save-btn" onclick="saveFleet()">Flotte speichern</button>
                <button onclick="resetMyBoard()">Reset</button>
            </div>
            
            <div class="board-section">
                <h3>Gegner A</h3>
                <div id="opponent-a" class="grid"></div>
            </div>
    
            <div class="board-section">
                <h3>Gegner B</h3>
                <div id="opponent-b" class="grid"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
